---
name: Publish crate
"on":
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to publish, for example v0.1.0
        required: true
        type: string
permissions:
  contents: read
env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.94.0
jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    steps:
      - name: Validate tag input
        run: |
          case "${{ inputs.tag }}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "tag must look like v0.1.0" >&2
              exit 1
              ;;
          esac
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" \
            --profile minimal \
            --component rustfmt \
            --component clippy
          rustup default "$RUST_VERSION"
          rustc --version
          cargo --version
          cargo fmt --version
          cargo clippy --version
      - name: Verify Cargo version matches tag
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          version="${tag#v}"
          cargo_version="$(python3 - <<'PY'
          import tomllib

          with open("Cargo.toml", "rb") as cargo_toml:
              version = tomllib.load(cargo_toml)["package"]["version"]

          print(version)
          PY
          )"
          if [ "$cargo_version" != "$version" ]; then
            echo "Cargo.toml version $cargo_version does not match tag $tag" >&2
            exit 1
          fi
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --locked
      - name: Package dry run
        run: cargo publish --dry-run --locked
      - name: Show packaged files
        run: cargo package --locked --list
  publish:
    name: Publish to crates.io
    needs: preflight
    runs-on: ubuntu-24.04
    environment: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_VERSION" --profile minimal
          rustup default "$RUST_VERSION"
          rustc --version
          cargo --version
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
